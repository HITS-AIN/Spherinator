seed_everything: 42

data:
  class_path: spherinator.data.DataModule
  init_args:
    path: ylecun/mnist
    columns:
      - name: image
        shape: [1,28,28]
        transform:
          class_path: torchvision.transforms.v2.Compose
          init_args:
            transforms:
              - class_path: torchvision.transforms.v2.RandomHorizontalFlip
              - class_path: torchvision.transforms.v2.RandomRotation
                init_args:
                  degrees: 180
      # - name: image
      #   shape: [1,28,28]
    return_dict: False
    validation_size: 0.2
    test_size: 0.5
    in_gpu_memory: True
  dict_kwargs:
    batch_size: 512
    shuffle: True
    num_workers: 0

model:
  class_path: spherinator.models.Autoencoder
  init_args:
    encoder:
      class_path: spherinator.models.GMRResNetSpatialEncoder
      init_args:
        block: GMR_Conv.GMRBasicBlock
        layers: [1, 1, 2, 2]
        input_dim: [1, 28, 28]
        latent_channels: 16
        inplanes: 16
        layer_stride: [1, 1, 2, 2]
        skip_first_maxpool: True
    decoder:
      class_path: spherinator.models.GMRResNetDecoder
      init_args:
        input_channels: 16
        output_dim: [1, 28, 28]
        inplanes: 16
        layers: [1, 1, 2, 2]
        layer_stride: [1, 1, 2, 2]
        skip_first_maxpool: True

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 0.001

trainer:
  max_epochs: 500
  accelerator: gpu
  devices: auto
  precision: bf16-mixed
  # log_every_n_steps: 50
  enable_progress_bar: True
  enable_model_summary: True

  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: mnist
      log_model: True
      entity: bernddoser
      tags:
        - mnist
        - autoencoder
        - gmr-resnet

  callbacks:
    - class_path: spherinator.callbacks.LogReconstructionCallback
      init_args:
        samples: 6
