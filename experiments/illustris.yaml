data:
  class_path: spherinator.data.DataModule
  init_args:
    path: /urz/gpuscratch/its/doserbd/data/SKIRT_synthetic_images/parquet-v4-128
    columns:
      - name: data
        transform:
          class_path: torchvision.transforms.v2.Compose
          init_args:
            transforms:
              - class_path: torchvision.transforms.v2.Resize
                init_args:
                  size: 224
    return_dict: False
  dict_kwargs:
    batch_size: 16384
    shuffle: True
    num_workers: 4
