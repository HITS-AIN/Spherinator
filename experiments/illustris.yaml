data:
  class_path: spherinator.data.DataModule
  init_args:
    path: data/SKIRT_synthetic_images/parquet-128
    columns:
      - name: data
        transform:
          class_path: torchvision.transforms.v2.Compose
          init_args:
            transforms:
              # - class_path: torchvision.transforms.v2.Resize
              #   init_args:
              #     size: 224
              - class_path: torchvision.transforms.v2.RandomHorizontalFlip
              - class_path: torchvision.transforms.v2.RandomRotation
                init_args:
                  degrees: 180
    return_dict: False
    batch_size: 512
    shuffle: True
    num_workers: 4
