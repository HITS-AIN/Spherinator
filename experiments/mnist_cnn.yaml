data:
  class_path: spherinator.data.DataModule
  init_args:
    path: ylecun/mnist
    columns:
      - name: image
        shape: [1,28,28]
    return_dict: False
    validation_size: 0.2
    test_size: 0.5
    in_gpu_memory: True
  dict_kwargs:
    batch_size: 512
    shuffle: True
    num_workers: 0

model:
  class_path: spherinator.models.Autoencoder
  init_args:
    encoder:
      class_path: spherinator.models.ConvolutionalEncoder2D
      init_args:
        input_dim: [1, 28, 28]
        output_dim: 32
        cnn_layers:
          - class_path: spherinator.models.ConsecutiveConv2DLayer
            init_args:
              kernel_size: 3
              stride: 1
              padding: 1
              out_channels: [16, 16]
              pooling:
                class_path: torch.nn.MaxPool2d
                init_args:
                  kernel_size: 2
          - class_path: spherinator.models.ConsecutiveConv2DLayer
            init_args:
              kernel_size: 3
              stride: 1
              padding: 1
              out_channels: [32, 32]
              pooling:
                class_path: torch.nn.MaxPool2d
                init_args:
                  kernel_size: 2
    decoder:
      class_path: spherinator.models.ConvolutionalDecoder2D
      init_args:
        input_dim: 32
        output_dim: [1, 28, 28]
        cnn_input_dim: [32, 7, 7]
        cnn_layers:
          - class_path: spherinator.models.ConsecutiveConvTranspose2DLayer
            init_args:
              kernel_size: 3
              stride: 2
              padding: 1
              output_padding: 1
              out_channels: [16, 16]
          - class_path: spherinator.models.ConsecutiveConvTranspose2DLayer
            init_args:
              kernel_size: 3
              stride: 1
              padding: 1
              output_padding: 0
              out_channels: [1]
              activation: torch.nn.Sigmoid
              norm: null

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 0.001

trainer:
  max_epochs: 500
  accelerator: gpu
  devices: auto
  precision: bf16-mixed
  # log_every_n_steps: 50
  enable_progress_bar: True
  enable_model_summary: True

  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: mnist
      log_model: True
      entity: bernddoser
      tags:
        - mnist
        - autoencoder
        - cnn

  callbacks:
    - class_path: spherinator.callbacks.LogReconstructionCallback
      init_args:
        samples: 6
