seed_everything: 42

data:
  class_path: spherinator.data.DataModule
  init_args:
    path: /home/bernd/data/SKIRT_synthetic_images_small/parquet-128
    columns:
      - name: data
        transform:
          class_path: torchvision.transforms.v2.Compose
          init_args:
            transforms:
              - class_path: torchvision.transforms.v2.RandomHorizontalFlip
              - class_path: torchvision.transforms.v2.RandomRotation
                init_args:
                  degrees: 180
    return_dict: False
  dict_kwargs:
    batch_size: 16
    shuffle: True
    num_workers: 4

model:
  class_path: spherinator.models.DualHeadVariationalAutoencoder
  init_args:
    encoder:
      class_path: spherinator.models.GMRResNetSpatialEncoder
      init_args:
        block: GMR_Conv.GMRBasicBlock
        layers: [2, 2, 2, 2]
        input_dim: [3, 128, 128]
        latent_channels: 3
    decoder:
      class_path: spherinator.models.GMRResNetDecoder
      init_args:
        input_channels: 3
        output_dim: [3, 128, 128]
    latent_channels: 3
    z_dim: 3
    beta: 1.0e-2

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 0.001

trainer:
  max_epochs: 500
  accelerator: gpu
  devices: auto
  precision: bf16-mixed
  # log_every_n_steps: 50
  enable_progress_bar: True
  enable_model_summary: True
  profiler: simple

  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: spherinator
      log_model: True
      entity: bernddoser
      tags:
        - GMRResNet
        - illustris_small
        - z3
        - dual_head_vae

  callbacks:
    - class_path: spherinator.callbacks.LogReconstructionCallback
      init_args:
        samples: 6