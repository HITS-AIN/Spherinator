seed_everything: 42

data:
  class_path: spherinator.data.DataModule
  init_args:
    path: ylecun/mnist
    columns:
      - name: image
        shape: [1,28,28]
        transform:
          class_path: torchvision.transforms.v2.Compose
          init_args:
            transforms:
              - class_path: torchvision.transforms.v2.Grayscale
                init_args:
                  num_output_channels: 3
      #         - class_path: torchvision.transforms.v2.RandomHorizontalFlip
      #         - class_path: torchvision.transforms.v2.RandomRotation
      #           init_args:
      #             degrees: 180
      # - name: image
      #   shape: [1,28,28]
    return_dict: False
    batch_size: 512
    shuffle: True
    num_workers: 4

model:
  class_path: spherinator.models.VariationalAutoencoder
  init_args:
    encoder:
      class_path: spherinator.models.Sequential
      init_args:
        modules:
          - class_path: spherinator.models.GMRResNetSpatialEncoder
            init_args:
              block: GMR_Conv.GMRBasicBlock
              layers: [1, 1, 2, 2]
              input_dim: [3, 28, 28]
              latent_channels: 65
              inplanes: 16
              layer_stride: [1, 1, 2, 2]
              skip_first_maxpool: True
          - class_path: torch.nn.AdaptiveAvgPool2d
            init_args:
              output_size: 1
    decoder:
      class_path: spherinator.models.Sequential
      init_args:
        modules:
          - class_path: torch.nn.Linear
            init_args:
              in_features: 65
              out_features: 3185
          - class_path: torch.nn.Unflatten
            init_args:
              dim: 1
              unflattened_size: [65, 7, 7]
          - class_path: spherinator.models.GMRResNetDecoder
            init_args:
              input_channels: 65
              output_dim: [3, 28, 28]
              inplanes: 16
              layers: [1, 1, 2, 2]
              layer_stride: [1, 1, 2, 2]
              skip_first_maxpool: True
    reconstruction_loss:
      class_path: monai.losses.SSIMLoss
      init_args:
        spatial_dims: 2
    z_dim: 65
    beta: 0.0
    encoder_out_dim: 65

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 0.001

trainer:
  max_epochs: 500
  accelerator: gpu
  devices: auto
  precision: bf16-mixed
  # log_every_n_steps: 50
  enable_progress_bar: True
  enable_model_summary: True

  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: mnist
      log_model: True
      entity: bernddoser
      tags:
        - mnist-gray
        - vae
        - gmr-resnet
        - S65
        - z16-7-7
        - ssim-loss
        - avg-pool

  callbacks:
    - class_path: spherinator.callbacks.LogReconstructionCallback
      init_args:
        samples: 6
