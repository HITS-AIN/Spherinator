seed_everything: 42

model:
  class_path: spherinator.models.VariationalAutoencoder
  init_args:
    encoder:
      class_path: spherinator.models.ConvolutionalEncoder2D
      init_args:
        input_dim: [3, 128, 128]
        output_dim: 64
        cnn_layers:
          - class_path: spherinator.models.ConsecutiveConv2DLayer
            init_args:
              kernel_size: 3
              stride: 1
              padding: 0
              out_channels: [16, 20, 24]
          - class_path: spherinator.models.ConsecutiveConv2DLayer
            init_args:
              kernel_size: 4
              stride: 2
              padding: 0
              out_channels: [32, 64]
    decoder:
      class_path: spherinator.models.ConvolutionalDecoder2D
      init_args:
        input_dim: 3
        output_dim: [3, 128, 128]
        cnn_input_dim: [64, 28, 28]
        cnn_layers:
          - class_path: spherinator.models.ConsecutiveConvTranspose2DLayer
            init_args:
              kernel_size: 5
              stride: 2
              padding: 0
              out_channels: [32]
          - class_path: spherinator.models.ConsecutiveConvTranspose2DLayer
            init_args:
              kernel_size: 6
              stride: 2
              padding: 0
              out_channels: [24]
          - class_path: spherinator.models.ConsecutiveConvTranspose2DLayer
            init_args:
              kernel_size: 3
              stride: 1
              padding: 0
              out_channels: [20, 16, 3]
              activation: null
    z_dim: 3
    beta: 1.0e-3
    encoder_out_dim: 64
    fixed_scale: null

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 0.001

trainer:
  max_epochs: -1
  accelerator: gpu
  devices: auto
  precision: 16-mixed
  log_every_n_steps: 1
  enable_progress_bar: True
  enable_model_summary: True
