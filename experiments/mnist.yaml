data:
  class_path: spherinator.data.DataModule
  init_args:
    path: ylecun/mnist
    columns:
      - name: image
        shape: [784]
    return_dict: False
    validation_size: 0.2
    test_size: 0.5
  dict_kwargs:
    batch_size: 4096
    shuffle: True
    num_workers: 4

model:
  class_path: spherinator.models.Autoencoder
  init_args:
    encoder:
      class_path: spherinator.models.MLPEncoder
      init_args:
        input_size: 784
        hidden_sizes: [512, 256]
        latent_size: 3
    decoder:
      class_path: spherinator.models.MLPDecoder
      init_args:
        latent_size: 3
        hidden_sizes: [256, 512]
        output_size: 784
optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 0.001

trainer:
  max_epochs: 5
  accelerator: gpu
  devices: auto
  precision: bf16-mixed
  # log_every_n_steps: 1
  enable_progress_bar: True
  enable_model_summary: True