seed_everything: 42

data:
  class_path: spherinator.data.DataModule
  init_args:
    path: /home/doserbd/data/SKIRT_synthetic_images_small/parquet-128
    columns:
      - name: data
        transform:
          class_path: torchvision.transforms.v2.Resize
          init_args:
            size: 224
    return_dict: False
  dict_kwargs:
    batch_size: 16
    shuffle: True
    num_workers: 4

model:
  class_path: spherinator.models.Autoencoder
  init_args:
    encoder:
      class_path: spherinator.models.GMRResNetEncoder
      init_args:
        block: GMR_Conv.GMRBasicBlock
        layers: [2, 2, 2, 2]
        latent_channels: 64
        latent_size: 7
        gmr_conv_size: 9
    decoder:
      class_path: spherinator.models.GMRUpsamplingDecoder2D
      init_args:
        input_dim: 3136
        output_dim: [3, 224, 224]
        base_channels: 64
        seed_size: 7
        gmr_conv_size: 9

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 0.001

trainer:
  max_epochs: 500
  accelerator: gpu
  devices: auto
  precision: bf16-mixed
  # log_every_n_steps: 50
  enable_progress_bar: True
  enable_model_summary: True

  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: spherinator
      log_model: True
      entity: bernddoser
      tags:
        - GMRResNet
        - illustris_small

  callbacks:
    - class_path: spherinator.callbacks.LogReconstructionCallback
      init_args:
        samples: 6